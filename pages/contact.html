<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Urban Bites</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button class="sidebar-toggle" aria-label="Toggle Menu">
        <i class="fas fa-bars"></i>
    </button>
    <div class="sidebar-overlay"></div>
    <nav class="sidebar">
        <div class="sidebar-logo">
            <span class="logo">URBAN BITES</span>
        </div>
        <ul class="sidebar-menu">
            <li class="sidebar-item"><a href="../index.html" class="sidebar-link"><i class="fas fa-home"></i> Home</a></li>
            <li class="sidebar-item"><a href="menu.html" class="sidebar-link"><i class="fas fa-utensils"></i> Menu</a></li>
            <li class="sidebar-item"><a href="services.html" class="sidebar-link"><i class="fas fa-concierge-bell"></i> Services</a></li>
            <li class="sidebar-item"><a href="contact.html" class="sidebar-link active"><i class="fas fa-paper-plane"></i> Contact</a></li>
            <li class="sidebar-item"><a href="timings.html" class="sidebar-link"><i class="fas fa-clock"></i> Timings</a></li>
        </ul>
    </nav>

    <main class="section" style="padding-top: 8rem;">
        <div class="container">
            <div class="section-header">
                <span>Get in Touch</span>
                <h2>Book Your Moments</h2>
            </div>
            <div class="contact-container">
                <div class="contact-form">
                    <form id="reservation-form">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Your Message</label>
                            <textarea rows="5" placeholder="Tell us about your occasion..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Request</button>
                    </form>
                </div>
                <div class="contact-info-list" style="display: flex; flex-direction: column; gap: 2rem;">
                    <div class="info-item-box" style="background: var(--bg-card); padding: 2rem; border-radius: 8px; border: var(--border-gold);">
                        <h4 style="color: var(--primary); margin-bottom: 1rem;"><i class="fas fa-map-marker-alt"></i> Location</h4>
                        <p>123 Luxury Ave, Manhattan, NY</p>
                    </div>
                    <div class="info-item-box" style="background: var(--bg-card); padding: 2rem; border-radius: 8px; border: var(--border-gold);">
                        <h4 style="color: var(--primary); margin-bottom: 1rem;"><i class="fas fa-phone-alt"></i> Call Now</h4>
                        <p><a href="tel:+919876543210" style="color: white;">+91 98765 43210</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/sidebar.js"></script>
</body>
</html>
